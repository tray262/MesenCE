name: Build Mesen Lightgun

on:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  windows-lightgun:
    runs-on: windows-2022

    steps:
      - name: Checkout lightgun source branch
        uses: actions/checkout@v4
        with:
          ref: codex/delete-menu-bezels-c774155
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Verify lightgun source changes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Select-String -Path 'Utilities/AutoResetEvent.cpp' -Pattern '#include <chrono>' | Out-Host
          Select-String -Path 'UI/Config/PreferencesConfig.cs' -Pattern 'DeleteMenu' | Out-Host
          Select-String -Path 'UI/Config/PreferencesConfig.cs' -Pattern 'EnableBezels' | Out-Host
          Select-String -Path 'UI/Config/PreferencesConfig.cs' -Pattern 'BezelFolder' | Out-Host
          Select-String -Path 'UI/Utilities/MouseManager.cs' -Pattern 'DeleteMenu' | Out-Host
          Select-String -Path 'UI/ViewModels/MainWindowViewModel.cs' -Pattern 'DeleteMenu' | Out-Host
          Select-String -Path 'UI/Views/PreferencesConfigView.axaml' -Pattern 'chkDeleteMenu' | Out-Host
          Select-String -Path 'UI/Views/PreferencesConfigView.axaml' -Pattern 'chkEnableBezels' | Out-Host
          Select-String -Path 'UI/Windows/MainWindow.axaml' -Pattern 'BezelOverlay' | Out-Host
          Select-String -Path 'UI/Windows/MainWindow.axaml.cs' -Pattern 'UpdateBezelOverlay' | Out-Host
          Select-String -Path 'Windows/Renderer.cpp' -Pattern 'DrawBezel' | Out-Host
          Select-String -Path 'InteropDLL/EmuApiWrapper.cpp' -Pattern 'SetBezelPath' | Out-Host

      - name: Restore packages
        run: dotnet restore -p:TargetFramework="net8.0" -r win-x64 -p:PublishAot="true"

      - name: Build Mesen
        run: msbuild -nologo -v:m -clp:ForceConsoleColor -m -p:Configuration=Release -p:Platform=x64 -t:Clean,UI -p:TargetFramework="net8.0"

      - name: Publish Mesen
        run: dotnet publish --no-restore -c Release -p:PublishAot="true" -p:SelfContained="true" -p:PublishSingleFile="false" -p:OptimizeUi="true" -p:Platform="Any CPU" -p:TargetFramework="net8.0" -r win-x64 Mesen.sln /p:PublishProfile=UI\Properties\PublishProfiles\Release.pubxml

      - name: Upload Mesen
        uses: actions/upload-artifact@v4
        with:
          name: Mesen-Windows-net8-Lightgun-DeleteMenu-Bezels-AoT
          path: |
            build/TmpReleaseBuild/Mesen.exe
            build/TmpReleaseBuild/MesenCore.dll
